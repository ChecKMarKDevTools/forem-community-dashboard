commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    format:
      priority: 1
      glob: "**/*.{js,ts,jsx,tsx,css,md,json,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      priority: 2
      glob: "**/*.{js,ts,jsx,tsx}"
      run: pnpm exec eslint {staged_files}
    stylelint:
      priority: 2
      glob: "**/*.{css,scss}"
      run: pnpm exec stylelint {staged_files}
    trufflehog:
      priority: 2
      run: docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:3.93.4 git file:///pwd --fail
    actionlint:
      priority: 2
      glob: ".github/workflows/**/*.yml"
      run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.11 -color

pre-push:
  parallel: true
  commands:
    tests:
      run: pnpm test
    build:
      run: pnpm run build
