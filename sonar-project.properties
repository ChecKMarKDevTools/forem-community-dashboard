sonar.projectKey=ChecKMarKDevTools_forem-community-dashboard
sonar.organization=checkmarkdevtools
sonar.sources=src
sonar.tests=src
sonar.inclusions=src/**/*.ts,src/**/*.tsx,src/**/*.js,src/**/*.jsx,**/*.json,**/*.md,**/*.yml,**/*.yaml,**/*.html
sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts
sonar.exclusions=src/**/*.test.tsx,src/**/*.test.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.reportPaths=coverage/coverage-summary.json

# Hadolint report (sonarqube format generated by hadolint-action in CI)
sonar.externalIssuesReportPaths=hadolint-results.json

# ESLint report (eslint-formatter-sonarjs must be used at lint time to generate this)
# sonar.eslint.reportPaths=coverage/eslint-report.json
